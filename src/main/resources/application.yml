server:
  port: 8080

spring:
  application:
    name: finvibe-gateway
  cloud:
    gateway:
      server:
        webflux:
          forwarded:
            enabled: false
          x-forwarded:
            enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

finvibe:
  gateway:
    services:
      market-url: ws://127.0.0.1:18090
      was-url: http://127.0.0.1:8080
