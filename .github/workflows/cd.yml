name: CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || format('{0}/finvibe-gateway', secrets.DOCKERHUB_USERNAME) }}
  CONTAINER_NAME: ${{ vars.DEPLOY_CONTAINER_NAME || 'finvibe-gateway' }}
  APP_PORT: ${{ vars.APP_PORT || '8080' }}
  LOG_DIR_HOST: ${{ vars.LOG_DIR_HOST || '/var/log/finvibe-gateway' }}
  PRIMARY_DOCKER_NETWORK: ${{ vars.PRIMARY_DOCKER_NETWORK || 'infra_bridge' }}
  SECONDARY_DOCKER_NETWORK: ${{ vars.SECONDARY_DOCKER_NETWORK || 'monitoring_net' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          LOG_DIR_HOST: ${{ env.LOG_DIR_HOST }}
          PRIMARY_DOCKER_NETWORK: ${{ env.PRIMARY_DOCKER_NETWORK }}
          SECONDARY_DOCKER_NETWORK: ${{ env.SECONDARY_DOCKER_NETWORK }}
          IMAGE_TAG: ${{ github.sha }}
          FINVIBE_GATEWAY_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          FINVIBE_GATEWAY_WEBSOCKET_LISTENER_URL: ${{ secrets.FINVIBE_GATEWAY_WEBSOCKET_LISTENER_URL }}
          FINVIBE_GATEWAY_WAS_URL: ${{ secrets.FINVIBE_GATEWAY_WAS_URL }}
          SPRING_PROFILES_ACTIVE: ${{ vars.SPRING_PROFILES_ACTIVE || 'prod' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_NAME,CONTAINER_NAME,APP_PORT,LOG_DIR_HOST,PRIMARY_DOCKER_NETWORK,SECONDARY_DOCKER_NETWORK,IMAGE_TAG,FINVIBE_GATEWAY_JWT_SECRET,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD,FINVIBE_GATEWAY_WEBSOCKET_LISTENER_URL,FINVIBE_GATEWAY_WAS_URL,SPRING_PROFILES_ACTIVE
          script: |
            set -eu

            echo "Deploy target hostname:"
            hostname || true
            echo "Host log directory: ${LOG_DIR_HOST}"
            echo "Primary docker network: ${PRIMARY_DOCKER_NETWORK}"
            echo "Secondary docker network: ${SECONDARY_DOCKER_NETWORK}"
            echo "Docker networks on target:"
            docker network ls || true

            required_vars="FINVIBE_GATEWAY_JWT_SECRET REDIS_HOST REDIS_PORT FINVIBE_GATEWAY_WEBSOCKET_LISTENER_URL FINVIBE_GATEWAY_WAS_URL"
            for var_name in ${required_vars}; do
              eval "var_value=\${${var_name}:-}"
              if [ -z "${var_value}" ]; then
                echo "Required deployment variable is missing: ${var_name}"
                exit 1
              fi
            done

            IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"
            CONTAINER_LOG_JSON_PATH="/app/logs/application-json.log"

            mkdir -p "${LOG_DIR_HOST}"

            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            docker pull "${IMAGE_REF}"

            docker network inspect "${PRIMARY_DOCKER_NETWORK}" >/dev/null 2>&1 || {
              echo "Primary docker network not found: ${PRIMARY_DOCKER_NETWORK}"
              exit 1
            }

            docker network inspect "${SECONDARY_DOCKER_NETWORK}" >/dev/null 2>&1 || {
              echo "Secondary docker network not found: ${SECONDARY_DOCKER_NETWORK}"
              exit 1
            }

            if docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
              docker rm -f "${CONTAINER_NAME}"
            fi

            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --network "${PRIMARY_DOCKER_NETWORK}" \
              -e SPRING_PROFILES_ACTIVE="${SPRING_PROFILES_ACTIVE}" \
              -e LOG_JSON_PATH="${CONTAINER_LOG_JSON_PATH}" \
              -e FINVIBE_GATEWAY_JWT_SECRET="${FINVIBE_GATEWAY_JWT_SECRET}" \
              -e REDIS_HOST="${REDIS_HOST}" \
              -e REDIS_PORT="${REDIS_PORT}" \
              -e REDIS_PASSWORD="${REDIS_PASSWORD}" \
              -e FINVIBE_GATEWAY_WEBSOCKET_LISTENER_URL="${FINVIBE_GATEWAY_WEBSOCKET_LISTENER_URL}" \
              -e FINVIBE_GATEWAY_WAS_URL="${FINVIBE_GATEWAY_WAS_URL}" \
              -v "${LOG_DIR_HOST}:/app/logs" \
              -p "${APP_PORT}:8080" \
              "${IMAGE_REF}"

            if ! docker network connect "${SECONDARY_DOCKER_NETWORK}" "${CONTAINER_NAME}"; then
              echo "Failed to connect container to secondary network"
              docker logs "${CONTAINER_NAME}" || true
              exit 1
            fi

            for i in $(seq 1 60); do
              if ! docker ps --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
                echo "Container exited before becoming healthy"
                docker logs "${CONTAINER_NAME}" || true
                exit 1
              fi

              if curl --silent --fail "http://localhost:${APP_PORT}/actuator/health/readiness" >/dev/null; then
                echo "Deployment healthy"
                exit 0
              fi

              echo "Waiting for readiness (${i}/60)..."
              sleep 5
            done

            echo "Readiness check failed. Container state:"
            docker inspect "${CONTAINER_NAME}" --format '{{json .State}}' || true
            echo "Container logs:"
            docker logs "${CONTAINER_NAME}" || true
            exit 1
